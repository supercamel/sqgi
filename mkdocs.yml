site_name: SQGI
site_description: Squirrel runtime and GObject Introspection bridge for native applications
repo_url: https://github.com/supercamel/sqgi
repo_name: supercamel/sqgi
docs_dir: docs
use_directory_urls: true

theme:
  name: readthedocs
  highlightjs: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore
    anchors: ignore

nav:
  - Home: index.md
  - Language Tutorial:
      - Chapter Map: language/00-chapter-map.md
      - Overview And Setup: language/01-overview-and-setup.md
      - Values, Types, And Operators: language/02-values-types-and-operators.md
      - Strings, Arrays, And Tables: language/03-strings-arrays-and-tables.md
      - Control Flow, Functions, And Closures: language/04-control-flow-functions-and-closures.md
      - Classes And Inheritance: language/05-classes-and-inheritance.md
      - Error Handling And Debugging: language/06-error-handling-and-debugging.md
      - GI Imports And GObject Basics: language/07-gi-imports-and-gobject-basics.md
      - Properties, Signals, And Subclassing: language/08-properties-signals-and-subclassing.md
      - Async Tasks And Cancellation: language/09-async-tasks-and-cancellation.md
      - Main Loops, Threading, And Event Model: language/10-main-loops-threading-and-event-model.md
      - End-To-End Patterns And Recipes: language/11-end-to-end-patterns-and-recipes.md
      - GVariant And GValue Interop: language/12-gvariant-and-gvalue-interop.md
  - API Reference: api/README.md
  - Recipes:
      - GLib: recipes/glib.md
      - Gio: recipes/gio.md
      - GTK 4: recipes/gtk4.md
      - GStreamer: recipes/gstreamer.md
      - Soup: recipes/soup.md
      - GdkPixbuf: recipes/gdkpixbuf.md
  - Packaging:
      - Overview: packaging/README.md
      - Package One Script: packaging/01-package-one-script.md
      - Manifest And Scripts: packaging/02-manifest-and-scripts.md
      - Resources And Files: packaging/03-resources-and-files.md
      - Runtime Libraries And GI Data: packaging/04-runtime-libraries-and-gi-data.md
      - Native GObject Modules: packaging/05-native-gobject-modules.md
      - Vala And Native Entry Apps: packaging/06-vala-and-native-entry.md
      - GTK Theming: packaging/07-gtk-theming.md
      - Targets And Cross Builds: packaging/08-targets-and-cross-builds.md
  - Internals:
      - Squirrel Bytecode JIT: internals/squirrel-bytecode-jit.md
